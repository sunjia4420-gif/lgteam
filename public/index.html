<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>筛词神器 - 登录</title>
<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --highlight: #0f3460;
  --accent: #e94560;
  --text: #e0e0f0;
  --text-muted: #8888aa;
  --border: #2a2a4e;
  --success: #1a6a2a;
  --error: #8a1a1a;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px 32px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

.login-header {
  text-align: center;
  margin-bottom: 32px;
}

.login-header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--highlight) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.login-header p {
  font-size: 14px;
  color: var(--text-muted);
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

.form-group input {
  width: 100%;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 15px;
  transition: all 0.2s;
}

.form-group input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
}

.form-group input::placeholder {
  color: var(--text-muted);
}

.btn-login {
  width: 100%;
  background: linear-gradient(135deg, var(--accent) 0%, var(--highlight) 100%);
  color: white;
  border: none;
  padding: 14px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 16px;
  font-weight: 600;
  transition: all 0.2s;
  margin-top: 8px;
}

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
}

.btn-login:active {
  transform: translateY(0);
}

.error-message {
  display: none;
  background: var(--error);
  color: white;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  margin-bottom: 16px;
  text-align: center;
}

.error-message.show {
  display: block;
}

.success-message {
  display: none;
  background: var(--success);
  color: white;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  margin-bottom: 16px;
  text-align: center;
}

.success-message.show {
  display: block;
}

.loading {
  display: none;
  text-align: center;
  margin-top: 12px;
}

.loading.show {
  display: block;
}

.spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.footer-text {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-muted);
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>🔐 筛词神器</h1>
      <p>请输入口令以访问工具</p>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="password">访问口令</label>
        <input 
          type="password" 
          id="password" 
          placeholder="请输入您的口令..." 
          autocomplete="off"
          required
          autofocus
        >
      </div>

      <button type="submit" class="btn-login" id="loginButton">
        进入工具
      </button>
    </form>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span style="margin-left: 8px; font-size: 14px; color: var(--text-muted);">验证中...</span>
    </div>

    <div class="footer-text">
      © 2026 筛词神器 v3.1 | 口令登录系统
    </div>
  </div>
</div>

<script>
// 检查是否已经登录
window.addEventListener('load', async () => {
  try {
    const response = await fetch('/api/check-auth');
    const data = await response.json();
    if (data.success) {
      // 已登录，跳转到工具页
      window.location.href = '/tool';
    }
  } catch (err) {
    console.error('检查登录状态失败:', err);
  }
});

async function handleLogin(event) {
  event.preventDefault();
  
  const password = document.getElementById('password').value.trim();
  const errorMessage = document.getElementById('errorMessage');
  const successMessage = document.getElementById('successMessage');
  const loading = document.getElementById('loading');
  const loginButton = document.getElementById('loginButton');
  
  if (!password) {
    showError('请输入口令');
    return;
  }
  
  // 隐藏消息，显示加载
  errorMessage.classList.remove('show');
  successMessage.classList.remove('show');
  loading.classList.add('show');
  loginButton.disabled = true;
  
  try {
    const response = await fetch('/api/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    
    const data = await response.json();
    
    loading.classList.remove('show');
    loginButton.disabled = false;
    
    if (data.success) {
      showSuccess('验证成功，正在跳转...');
      setTimeout(() => {
        window.location.href = '/tool';
      }, 800);
    } else {
      showError(data.message || '口令错误');
    }
  } catch (err) {
    loading.classList.remove('show');
    loginButton.disabled = false;
    showError('网络错误，请稍后重试');
    console.error('登录失败:', err);
  }
}

function showError(message) {
  const errorMessage = document.getElementById('errorMessage');
  errorMessage.textContent = message;
  errorMessage.classList.add('show');
  document.getElementById('successMessage').classList.remove('show');
}

function showSuccess(message) {
  const successMessage = document.getElementById('successMessage');
  successMessage.textContent = message;
  successMessage.classList.add('show');
  document.getElementById('errorMessage').classList.remove('show');
}

// 回车提交
document.getElementById('password').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    handleLogin(e);
  }
});
</script>

</body>
</html>
