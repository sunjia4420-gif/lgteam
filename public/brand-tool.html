<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品牌检测工具</title>
<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --highlight: #0f3460;
  --accent: #e94560;
  --text: #e0e0f0;
  --text-muted: #8888aa;
  --border: #2a2a4e;
  --success: #1a6a2a;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

.app-header {
  background: linear-gradient(135deg, var(--highlight) 0%, var(--accent) 100%);
  color: white;
  padding: 16px 24px;
  font-size: 20px;
  font-weight: 600;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  gap: 12px;
}

.app-header span {
  cursor: default;
}

.main-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 16px;
  max-width: 1600px;
  margin: 0 auto;
}

@media (max-width: 1024px) {
  .main-layout {
    grid-template-columns: 1fr;
  }
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.card-header {
  padding: 12px 16px;
  background: linear-gradient(90deg, var(--highlight) 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
}

.card-body {
  padding: 16px;
}

.badge {
  background: var(--accent);
  color: white;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
}

.btn {
  background: var(--highlight);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}

.btn:hover {
  background: var(--accent);
  color: white;
}

.btn-sm {
  padding: 6px 14px;
  font-size: 13px;
  border-radius: var(--radius);
  background: var(--highlight);
  color: white;
  border: none;
  cursor: pointer;
}
.btn-sm:hover {
  opacity: 0.85;
}

.btn-primary {
  background: var(--accent);
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.2s;
}

.btn-primary:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}

textarea {
  width: 100%;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  font-size: 13px;
  resize: vertical;
  font-family: inherit;
  min-height: 120px;
}

textarea:focus {
  outline: none;
  border-color: var(--accent);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 12px;
}

th {
  background: var(--highlight);
  padding: 8px 10px;
  text-align: left;
  font-weight: 600;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}

td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

tr:hover {
  background: rgba(233, 69, 96, 0.1);
}

.table-container {
  max-height: 500px;
  overflow-y: auto;
  margin-top: 12px;
}

.stats {
  display: flex;
  gap: 16px;
  margin-top: 12px;
  padding: 12px;
  background: var(--bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.stat-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
}

.stat-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
}

.brand-tag {
  display: inline-block;
  background: var(--highlight);
  color: var(--text);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  margin: 2px;
}

.brand-tag.match {
  background: var(--accent);
  color: white;
}

/* 品牌词库编辑模态框 */
.brand-lib-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

.brand-lib-modal.show {
  display: flex;
}

.brand-lib-modal-inner {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 90%;
  max-width: 800px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}

.brand-lib-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

.brand-lib-body {
  padding: 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.brand-lib-body textarea {
  flex: 1;
  min-height: 400px;
  font-size: 12px;
  font-family: monospace;
}

.brand-lib-toolbar {
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--text-muted);
}

.result-table-wrapper {
  max-height: 500px;
  overflow-y: auto;
  margin-top: 12px;
}
</style>
</head>

<script>
// 身份验证 - 检查用户是否已登录
(async function() {
  try {
    const response = await fetch('/api/check-auth');
    const data = await response.json();
    if (!data.success) {
      window.location.href = '/login';
    }
  } catch (err) {
    window.location.href = '/login';
  }
})();
</script>

<header class="app-header">
  <span>🔍 品牌检测工具</span>
</header>

<main class="main-layout">
  <!-- 左侧：品牌词库管理 -->
  <div class="card">
    <div class="card-header">
      <span>🏷️ 品牌词库</span>
      <span class="badge" id="brandCount">0</span>
      <button class="btn" onclick="openBrandLibModal()">编辑词库</button>
    </div>
    <div class="card-body">
      <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">
        内置品牌词库已加载，包含常见品牌名称。点击"编辑词库"可查看、添加或修改品牌词。
      </div>
      <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">
        预览（前20个）：
      </div>
      <div id="brandPreview" style="display: flex; flex-wrap: wrap; gap: 4px;"></div>
    </div>
  </div>

  <!-- 右侧：品牌检测 -->
  <div class="card">
    <div class="card-header">
      <span>🔎 品牌检测</span>
      <button class="btn-primary" onclick="detectBrands()" style="margin-left: auto;">开始检测</button>
    </div>
    <div class="card-body">
      <div style="margin-bottom: 12px;">
        <label style="display: block; font-size: 13px; margin-bottom: 6px; color: var(--text-muted);">
          输入待检测词组（每行一个词组）：
        </label>
        <textarea id="phraseInput" rows="6" placeholder="请输入待检测的词组，每行一个&#10;例如：&#10;nike running shoes&#10;adidas basketball&#10;puma sneakers"></textarea>
      </div>
      
      <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="substringMatch" onchange="updateMatchMode()">
        <label for="substringMatch" style="font-size: 13px; color: var(--text-muted); cursor: pointer;">
          包含字符段匹配（子串匹配）- 勾选后 "seemless" 中的 "see" 也会被匹配
        </label>
      </div>
      
      <div id="resultsSection" style="display: none;">
        <div class="stats" id="statsBar">
          <div class="stat-item">
            <span class="stat-label">总词组数</span>
            <span class="stat-value" id="totalCount">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">包含品牌</span>
            <span class="stat-value" id="withBrandCount">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">不包含品牌</span>
            <span class="stat-value" id="withoutBrandCount">0</span>
          </div>
          <button class="btn btn-sm" onclick="exportResultCSV()" style="margin-left:auto;">📥 导出 CSV</button>
        </div>
        
        <div class="result-table-wrapper" id="tableContainer"></div>
      </div>
    </div>
  </div>
</main>

<!-- 品牌词库编辑模态框 -->
<div class="brand-lib-modal" id="brandLibModal">
  <div class="brand-lib-modal-inner">
    <div class="brand-lib-header">
      <span style="font-size: 16px; font-weight: 600;">品牌词库编辑</span>
      <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <button class="btn" onclick="dedupeBrandLib()">🔄 去重</button>
        <button class="btn" onclick="saveBrandLib()">💾 保存</button>
        <button class="btn" onclick="restoreBrandLib()">♻️ 恢复默认</button>
        <button class="btn" style="background: #8a1a1a; color: white; border: none;" onclick="closeBrandLibModal()">关闭</button>
      </div>
    </div>
    <div class="brand-lib-body">
      <textarea id="brandLibEditor" placeholder="每行一个品牌名"></textarea>
      <div class="brand-lib-toolbar">
        <span id="brandLibCount">0 个品牌</span>
        <span>修改后点击"保存"生效</span>
      </div>
    </div>
  </div>
</div>

// 构建品牌词 Set
let brandSet = new Set(BRAND_TEXT.split('\n').map(b => b.trim().toLowerCase()).filter(b => b.length > 0));

// ========= 匹配模式控制 =========
let useSubstringMatch = false;

function updateMatchMode() {
  useSubstringMatch = document.getElementById('substringMatch').checked;
}

// ========= 品牌检测函数 =========
function autoDetectBrand(phrase) {
  const lower = phrase.toLowerCase();
  for (const brand of brandSet) {
    const brandLower = brand.toLowerCase();
    
    // 如果启用子串匹配模式
    if (useSubstringMatch) {
      if (lower.includes(brandLower)) {
        return brand;
      }
    } else {
      // 完整单词匹配模式（默认）
      const regex = new RegExp(`(^|\\s)${brandLower.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}(\\s|$|[^a-z])`, 'i');
      if (regex.test(' ' + lower + ' ') || lower === brandLower) {
        return brand;
      }
    }
  }
  return null;
}

// ========= 品牌词库管理 =========
function openBrandLibModal() {
  const modal = document.getElementById('brandLibModal');
  const editor = document.getElementById('brandLibEditor');
  
  editor.value = BRAND_TEXT;
  updateBrandLibCount();
  
  modal.classList.add('show');
}

function closeBrandLibModal() {
  const modal = document.getElementById('brandLibModal');
  modal.classList.remove('show');
}

function saveBrandLib() {
  const editor = document.getElementById('brandLibEditor');
  const newBrands = editor.value.split('\n').map(b => b.trim().toLowerCase()).filter(b => b.length > 0);
  
  BRAND_TEXT = editor.value;
  
  brandSet.clear();
  for (const b of newBrands) {
    brandSet.add(b);
  }
  
  // 保存到 localStorage
  localStorage.setItem('brandDetector_brands', editor.value);
  
  updateBrandLibCount();
  updateBrandCount();
  updateBrandPreview();
  alert('品牌词库已更新！');
  closeBrandLibModal();
}

function restoreBrandLib() {
  if (confirm('确定恢复默认品牌词库吗？')) {
    const editor = document.getElementById('brandLibEditor');
    editor.value = BRAND_TEXT;
    updateBrandLibCount();
  }
}

function updateBrandLibCount() {
  const editor = document.getElementById('brandLibEditor');
  const count = editor.value.split('\n').filter(b => b.trim().length > 0).length;
  document.getElementById('brandLibCount').textContent = `${count} 个品牌`;
}

function dedupeBrandLib() {
  const ta = document.getElementById('brandLibEditor');
  const lines = ta.value.split('\n').map(w => w.trim().toLowerCase()).filter(Boolean);
  const unique = [...new Set(lines)];
  ta.value = unique.join('\n');
  updateBrandLibCount();
  alert('去重完成！已删除 ' + (lines.length - unique.length) + ' 个重复品牌词。');
}

// ========= 更新品牌计数和预览 =========
function updateBrandCount() {
  document.getElementById('brandCount').textContent = brandSet.size;
}

function updateBrandPreview() {
  const preview = document.getElementById('brandPreview');
  preview.innerHTML = '';
  
  const showCount = Math.min(brandSet.size, 20);
  const brands = Array.from(brandSet).slice(0, showCount);
  
  for (const brand of brands) {
    const tag = document.createElement('span');
    tag.className = 'brand-tag';
    tag.textContent = brand;
    preview.appendChild(tag);
  }
  
  if (brandSet.size > 20) {
    const more = document.createElement('span');
    more.className = 'brand-tag';
    more.textContent = `...还有${brandSet.size - 20}个`;
    preview.appendChild(more);
  }
}

// ========= 检测品牌 =========
function detectBrands() {
  const input = document.getElementById('phraseInput').value;
  const phrases = input.split('\n').map(p => p.trim()).filter(p => p.length > 0);
  
  if (phrases.length === 0) {
    alert('请输入待检测的词组！');
    return;
  }
  
  const results = [];
  let withBrandCount = 0;
  
  for (let i = 0; i < phrases.length; i++) {
    const phrase = phrases[i];
    const matchedBrand = autoDetectBrand(phrase);
    const hasBrand = matchedBrand !== null;
    
    if (hasBrand) {
      withBrandCount++;
    }
    
    results.push({
      index: i + 1,
      phrase: phrase,
      hasBrand: hasBrand,
      matchedBrand: matchedBrand || '-'
    });
  }
  
  const withoutBrandCount = phrases.length - withBrandCount;
  
  // 更新统计
  document.getElementById('totalCount').textContent = phrases.length;
  document.getElementById('withBrandCount').textContent = withBrandCount;
  document.getElementById('withoutBrandCount').textContent = withoutBrandCount;
  
  // 渲染表格
  renderResultTable(results);
  
  // 显示结果区域
  document.getElementById('resultsSection').style.display = 'block';
}

function exportResultCSV() {
  const rows = document.querySelectorAll('#resultTable tbody tr');
  if (rows.length === 0) {
    alert('暂无检测结果可导出');
    return;
  }

  // CSV 表头
  let csv = '\ufeff序号,词组,匹配品牌\n';

  rows.forEach(tr => {
    const cells = tr.querySelectorAll('td');
    if (cells.length < 4) return;
    const seq = cells[0].textContent;
    const phrase = cells[1].textContent;
    const matched = cells[3].textContent;
    const escapeCSV = s => '"' + s.replace(/"/g, '""') + '"';
    csv += [seq, escapeCSV(phrase), escapeCSV(matched)].join(',') + '\n';
  });

  // 下载
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '品牌检测结果_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function renderResultTable(results) {
  const container = document.getElementById('tableContainer');
  
  let html = '<table id="resultTable"><thead><tr>';
  html += '<th>序号</th><th>词组</th><th>检测结果</th><th>匹配的品牌词</th>';
  html += '</tr></thead><tbody>';
  
  for (const r of results) {
    html += '<tr>';
    html += `<td>${r.index}</td>`;
    html += `<td>${escapeHtml(r.phrase)}</td>`;
    html += `<td>${r.hasBrand ? '<span style="color:#e94560;font-weight:600;">包含品牌</span>' : '<span style="color:#1a6a2a;">不包含品牌</span>'}</td>`;
    html += `<td>${r.hasBrand ? `<span class="brand-tag match">${escapeHtml(r.matchedBrand)}</span>` : '-'}</td>`;
    html += '</tr>';
  }
  
  html += '</tbody></table>';
  container.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ========= 初始化 =========
function init() {
  // 尝试从 localStorage 加载用户自定义品牌词库
  const saved = localStorage.getItem('brandDetector_brands');
  if (saved) {
    BRAND_TEXT = saved;
    brandSet.clear();
    const brands = saved.split('\n').map(b => b.trim().toLowerCase()).filter(b => b.length > 0);
    for (const b of brands) {
      brandSet.add(b);
    }
  }
  
  // 更新品牌计数
  updateBrandCount();
  
  // 更新品牌预览
  updateBrandPreview();
  
  // 点击模态框外部关闭
  document.getElementById('brandLibModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
      closeBrandLibModal();
    }
  });
  
  // 监听品牌词库编辑器变化
  const brandEditor = document.getElementById('brandLibEditor');
  brandEditor.addEventListener('input', updateBrandLibCount);
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', init);
</script>
